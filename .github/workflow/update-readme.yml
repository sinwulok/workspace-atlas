name: Update README Project Overview # v3

on:
  push:
    branches: ["main"]
    paths-ignore:
      - '.github/workflows/update-readme.yml'
      - '.github/scripts/**'
      - 'README.md'
  schedule:
    - cron: '0 6 */3 * *'   # 每 3 天 UTC 06:00 執行一次
  workflow_dispatch:

jobs:
  generate-readme:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run README generator
        run: |
          python .github/scripts/generate_readme.py

      - name: Commit updated README (if any)
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions
          author_email: github-actions@github.com
          message: 'chore: update project overview table [skip ci]'
          add: 'README.md'
          branch: main
