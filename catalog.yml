# root/catalog.yml
# Optional catalog to provide stable Type / Description and exclusions.
# 用法：projects 下以資料夾名稱為 key；可設定 type, description, exclude (true/false)
projects:
  animated-gradient-text-starter:
    type: "Frontend / UI Demo"
    description: "Animated gradient text starter project built with Next.js, TypeScript, and Tailwind CSS."
  binance-multi-assets-singal-agent:
    type: "Quant / Trading"
    description: "Multi-asset Binance trading signal agent / bot prototype with backend and frontend structure."
  bond-weighted-forecast:
    type: "Data Science / Forecasting"
    description: "Forecasting / modeling demo related to weighted bond prediction."
  e-learning-fa-ipy:
    type: "Data Science / Machine Learning"
    description: "E-learning data analysis project using Jupyter notebooks, with preprocessing, modeling, and visualization."
  machine-learning-applications-in-fmri:
    type: "Data Science / Research"
    description: "Machine learning experiment or research demo focused on fMRI applications."
  r3f-portfolio:
    type: "Frontend / Portfolio"
    description: "React Three Fiber portfolio with 3D visuals, animations, and interactive sections."
  sw-single-page-cv-latex-templates:
    type: "Templates / Utilities"
    description: "LaTeX templates for single-page CV / resume documents."
  # 範例：若不想在總覽中顯示某個資料夾，設定 exclude: true
  # secret-proj:
  #   exclude: true
