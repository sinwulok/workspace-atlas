# metadata.schema.yml
# Project metadata field definitions

# This file defines the format and purpose of fields in projects.yml

fields:
  path:
    type: string
    required: true
    description: Project path relative to repository root
    example: "Research/cnogb-bond-signal-anomaly"

  category:
    type: string
    required: true
    description: Project category
    allowed_values:
      - Research
      - Development
      - Other

  type:
    type: string
    required: true
    description: Project type description
    example: "Transformer | Data Science | Machine Learning | Anomaly"

  description:
    type: string
    required: true
    description: Project description

  lifecycle:
    type: string
    required: true
    description: Project lifecycle status
    allowed_values:
      - incubation
      - stable
      - archived

  tags:
    type: array
    required: false
    description: Project tag list
    item_type: string
