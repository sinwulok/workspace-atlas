# statuses.yml
# Project lifecycle status definitions

statuses:
  incubation:
    label: Incubation
    description: Early-stage, experimental projects that may change or be refactored at any time
    color: yellow
    criteria:
      - Project is in early development stage
      - API or architecture may change at any time
      - Main features not yet complete
      - Suitable for experimentation and exploration

  stable:
    label: Stable
    description: Completed main features, ready for use
    color: green
    criteria:
      - Main features completed
      - Available for use or reference
      - Architecture relatively stable
      - Basic documentation available

  archived:
    label: Archived
    description: No longer maintained but preserved for reference
    color: gray
    criteria:
      - No longer actively developed
      - Preserved for historical reference
      - May use outdated technologies or methods
      - Consider alternative projects

# Notes
notes: |
  Project lifecycle statuses are metadata markers only, not physical directories.
  All status information is stored in catalog/projects.yml.
  Project locations are determined by their functional category (Research/Development/Other).
